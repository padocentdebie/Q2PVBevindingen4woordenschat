            if(!naam || !klas) return alert("Credentials required.");
            
            window.user = { naam, klas };
            mijnKaart = [..._0xSecurity].sort(() => 0.5 - Math.random()).slice(0, 6);

            document.getElementById('auth').style.display = 'none';
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('info-klas').innerText = `UNIT: ${klas} | AGENT: ${naam}`;
            loadLeaderboard(klas);
            setupSubtitleEngine();
        };

        function tekenKaart() {
            const grid = document.getElementById('bingo-grid');
            grid.innerHTML = mijnKaart.map((item, index) => `
                <button id="btn-${index}" onclick="checkWoord(${index})" class="h-32 p-4 bg-white border-2 border-slate-200 rounded-[2rem] shadow-sm text-[10px] font-bold leading-tight hover:border-blue-900 transition-all flex items-center justify-center text-center italic uppercase">
                    "${_d(item.d)}"
                </button>
            `).join('');
        }

        window.checkWoord = (index) => {
            const data = mijnKaart[index];
            const audio = document.getElementById('podcast-player');
            if (audio.currentTime >= data.t) {
                const btn = document.getElementById(`btn-${index}`);
                if (!btn.disabled) {
                    btn.disabled = true;
                    btn.classList.replace('bg-white', 'bg-[#002d5e]');
                    btn.classList.add('text-white', 'not-italic', 'border-[#002d5e]');
                    btn.innerHTML = `✓<br>${_d(data.w).toUpperCase()}`;
                    if (++window.afgevinkt === 6) meldWinst();
                }
            } else { alert("Geduld... je hebt dit woord nog niet gehoord."); }
        };

        function setupSubtitleEngine() {
            const audio = document.getElementById('podcast-player');
            const subBox = document.getElementById('subtitle-text');
            audio.addEventListener('timeupdate', () => {
                const current = subtitles.filter(s => s.t <= audio.currentTime).pop();
                subBox.innerText = current ? current.text : "";
            });
        }

        function meldWinst() {
            push(ref(db, `bingo_2026/klassen/${window.user.klas}/winnaars`), { 
                naam: window.user.naam, tijd: new Date().toLocaleTimeString() 
            });
        }

        window.afgevinkt = 0;
        window.resetLeaderboard = () => remove(ref(db, `bingo_2026/klassen/${window.user.klas}/winnaars`));
        
        function loadLeaderboard(klas) {
            onValue(ref(db, `bingo_2026/klassen/${klas}/winnaars`), (snap) => {
                const list = document.getElementById('leaderboard-list');
                list.innerHTML = "";
                const data = snap.val();
                if(data) Object.values(data).reverse().forEach(w => {
                    list.innerHTML += `<div class="p-3 bg-blue-50 rounded-2xl border-l-4 border-[#002d5e] text-[10px] font-black mb-2 flex justify-between uppercase"><span>${w.naam}</span><span class="opacity-30">${w.tijd}</span></div>`;
