            { w: "dG90YWxpdGFpcg==", d: "U3lzdGVlbSB3YWFyaW4gZGUgc3RhYXQgYWxsZXMgY29udHJvbGVlcnQu", t: 69 },

            { w: "ZGVuaWdyZXJlbg==", d: "SWeightWVtZCBvcCBlZW4ga2xlaW5lcmVuZGUgbWFuaWVyIGJlc3ByZWtlbi4=", t: 77 },
            { w: "a2FzdGU=", d: "QWZnZXNsb3RlbiBncm9lcCBpbiBlZW4gc2FtZW5sZXZpbmcu", t: 84 },

            { w: "Y2FwaXR1bGF0aWVs", d: "T3ZlcmdhdmUu", t: 108 },
            { w: "c2NhbGE=", d: "RWVuIGdyb3RlIHZhcmlhdGllIG9mIHJlZWtzLg==", t: 113 },
            { w: "Y29sbGVjdG9yZW4=", d: "VmVyemFtZWxhYXJzLg==", t: 118 },
            { w: "ZW5kb3Njb3BpZQ==", d: "SW53ZW5kaWcgb25kZXJ6b2VrIHZhbiBoZXQgbGljaGFhbS4=", t: 124 },
            { w: "cmVjZXNzaWVm", d: "TmlldC1vdmVyaGVlcnNlbmQgKGluIGRlIGVyZmVsaWpraGVpZCku", t: 137 },
            { w: "Z3VpdGln", d: "T25kZXVnZW5kIGVuIGdyYXBwaWcu", t: 147 },
            { w: "YWRvbGVzY2VudA==", d: "SWeightWVtZCBpbiBkZSBvdmVyZ2FuZyBuYWFyIHZvbHdhc3NlbmhlaWQu", t: 149 },
            { w: "Y3VycmljdWx1bSB2aXRhZQ==", d: "T3ZlcnppY2h0IHZhbiBpZW1hbmRzIGxvb3BiYWFuLg==", t: 156 },
            { w: "ZWxlbWVudGFpcg==", d: "RGUgYmFzaXMgYmV0cmVra2VuZC4=", t: 162 },
            { w: "c2FuYXRvcml1bQ==", d: "SGVyc3RlbGxpbmdzb29yZCB2b29yIGxhbmdkdXJpZyB6aWVrZW4u", t: 169 },
            { w: "aW50ZWdyYXRpZQ==", d: "RGUgb3BuYW1lIGluIGVlbiBncm90ZXIgZ2VoZWVsLg==", t: 177 },
            { w: "Y29uZmlkZW50aWVlbA==", d: "VmVydHJvdXdlbGlqay4=", t: 184 },
            { w: "cG9zdHNjcmlwdHVt", d: "TmFzY2hyaWZ0IChQLlMuKS4=", t: 198 }
        ];

        let mijnKaart = [];
        let afgevinkt = 0;

        const _d = (s) => decodeURIComponent(escape(window.atob(s)));

        window.login = () => {
            const naam = document.getElementById('naam').value.trim().toUpperCase();
            const klas = document.getElementById('klas').value;
            if(!naam || !klas) return alert("Identificatie onvolledig.");
            
            window.user = { naam, klas };
            mijnKaart = [..._0xPayload].sort(() => 0.5 - Math.random()).slice(0, 6);
            tekenKaart();
            
            document.getElementById('auth').style.display = 'none';
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('info-klas').innerText = `KLAS: ${klas} | AGENT: ${naam}`;
            loadLeaderboard(klas);
        };

        function tekenKaart() {
            const grid = document.getElementById('bingo-grid');
            grid.innerHTML = mijnKaart.map((item, index) => `
                <button id="btn-${index}" onclick="checkWoord(${index})" class="h-32 p-4 bg-white border-2 border-slate-200 rounded-2xl shadow-sm text-[10px] font-bold leading-tight hover:border-blue-900 transition-all flex items-center justify-center text-center italic uppercase">
                    "${_d(item.d)}"
                </button>
            `).join('');
        }

        window.checkWoord = (index) => {
            const data = mijnKaart[index];
            const audio = document.getElementById('podcast-player');
            
            if (audio.currentTime >= data.t) {
                const btn = document.getElementById(`btn-${index}`);
                if (!btn.disabled) {
                    btn.disabled = true;
                    btn.classList.replace('bg-white', 'bg-emerald-500');
                    btn.classList.add('text-white', 'not-italic', 'border-emerald-600');
                    btn.innerHTML = `<span class="text-xl mb-1">✓</span><br>${_d(data.w).toUpperCase()}`;
                    afgevinkt++;
                    if (afgevinkt === 6) meldWinst();
                }
            } else {
                alert("Nog niet gehoord! Blijf gefocust op de audio.");
            }
        };

        function meldWinst() {
            const winRef = ref(db, `bingo_2026/klassen/${window.user.klas}/winnaars`);
            push(winRef, { naam: window.user.naam, tijd: new Date().toLocaleTimeString() });
            alert("BINGO! Je staat op het leaderboard.");
        }

        window.resetLeaderboard = () => {
            if(confirm(`Leaderboard van ${window.user.klas} wissen?`)) {
                remove(ref(db, `bingo_2026/klassen/${window.user.klas}/winnaars`));
            }
        };

        function loadLeaderboard(klas) {
            onValue(ref(db, `bingo_2026/klassen/${klas}/winnaars`), (snap) => {
                const list = document.getElementById('leaderboard-list');
                list.innerHTML = "";
                const data = snap.val();
                if(data) {
                    Object.values(data).reverse().forEach(w => {
                        list.innerHTML += `
                        <div class="p-3 bg-blue-50 rounded-xl border-l-4 border-[#002d5e] text-[10px] font-black mb-2 uppercase flex justify-between items-center shadow-sm">
                            <span>${w.naam}</span>
                            <span class="opacity-30">${w.tijd}</span>
                        </div>`;
                    });
                }
            });
        }
    </script>
</head>
<body class="bg-slate-100 text-slate-900 font-sans antialiased">

    <div id="auth" class="fixed inset-0 bg-[#002d5e] z-50 flex items-center justify-center p-4">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl max-w-sm w-full text-center border-t-8 border-yellow-500">
            <h1 class="font-black text-2xl mb-1 text-[#002d5e] uppercase italic">BTV BINGO</h1>
            <p class="text-[8px] uppercase tracking-[0.4em] text-slate-400 mb-8 font-bold text-center">Secure Vocabulary Stream</p>
            <input type="text" id="naam" placeholder="ACHTERNAAM AGENT" class="w-full border-4 border-slate-50 p-4 rounded-xl mb-4 font-black uppercase text-xs focus:border-[#002d5e] outline-none text-center">
            <select id="klas" class="w-full border-4 border-slate-50 p-4 rounded-xl mb-8 font-black uppercase text-xs focus:border-[#002d5e] outline-none text-center">
                <option value="">NATO-UNIT</option>
                <option value="ALFA">ALFA</option><option value="BRAVO">BRAVO</option>
                <option value="CHARLIE">CHARLIE</option><option value="DELTA">DELTA</option>
                <option value="ECHO">ECHO</option><option value="FOXTROT">FOXTROT</option>
                <option value="GOLF">GOLF</option><option value="HOTEL">HOTEL</option>
                <option value="JULIETT">JULIETT</option><option value="KILO">KILO</option>
                <option value="LIMA">LIMA</option><option value="MIKE">MIKE</option>
            </select>
            <button onclick="login()" class="w-full bg-[#002d5e] text-white p-4 rounded-xl font-black uppercase text-xs tracking-widest shadow-xl border-b-4 border-blue-950 active:translate-y-1">Initialiseer Bingo</button>
        </div>
    </div>

    <div id="app" class="hidden max-w-6xl mx-auto p-4 md:p-8">
        <header class="flex justify-between items-center mb-8 border-b-2 border-slate-200 pb-4">
            <div id="info-klas" class="text-[#002d5e] font-black text-[9px] tracking-widest uppercase italic"></div>
            <button onclick="resetLeaderboard()" class="text-[7px] font-black text-rose-500 uppercase tracking-widest bg-rose-50 px-3 py-1 rounded hover:bg-rose-100">Reset Sessie</button>
        </header>

        <div class="grid lg:grid-cols-12 gap-8">
            <div class="lg:col-span-8">
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 mb-8 text-center">
                    <p class="text-[9px] font-black text-slate-300 uppercase tracking-widest mb-4">Master Audio Feed</p>
                    <audio id="podcast-player" controls class="w-full max-w-md mx-auto">
                        <source src="podcast_anatomie_afgrond.mp3" type="audio/mpeg">
                    </audio>
                </div>
                <div id="bingo-grid" class="grid grid-cols-2 md:grid-cols-3 gap-4">
                    </div>
            </div>

            <aside class="lg:col-span-4">
                <div class="bg-white p-6 rounded-3xl shadow-xl border border-slate-200 sticky top-4">
                    <h3 class="font-black text-[#002d5e] uppercase italic mb-6 text-sm border-b pb-2">Unit Leaderboard</h3>
                    <div id="leaderboard-list">
                        <p class="text-[9px] italic text-slate-300 uppercase text-center py-10">Wachten op eerste bingo's...</p>
                    </div>
                    <div class="mt-8 pt-4 border-t border-slate-50 text-center opacity-10 font-black text-[10px]">BTV SYSTEM // 2026</div>
                </div>
            </aside>
        </div>
    </div>
</body>
</html>
