<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snel-Bingo: 6 Woorden</title>
    <style>
        :root { --primary: #2c3e50; --accent: #e74c3c; --bg: #f4f7f6; --green: #2ecc71; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 800px; width: 100%; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        /* Compacte Grid voor 6 items */
        .bingo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 20px 0; }
        .bingo-cell { 
            background: #f8f9fa; border: 2px solid #dee2e6; border-radius: 12px; padding: 20px 10px; 
            text-align: center; cursor: pointer; font-weight: bold; transition: 0.2s; min-height: 80px;
            display: flex; align-items: center; justify-content: center;
        }
        .bingo-cell.marked { background: var(--green); color: white; border-color: #27ae60; transform: translateY(-3px); }

        .login-box { background: #e3f2fd; padding: 20px; border-radius: 15px; text-align: center; margin-bottom: 20px; }
        input, select { padding: 10px; margin: 5px; border-radius: 8px; border: 1px solid #ccc; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        th { background: var(--primary); color: white; }
        
        .btn-reset { background: #95a5a6; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin-top: 50px; font-size: 0.8rem; }
        .btn-reset:hover { background: var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center;">🎯 Snelle Woorden Bingo</h2>

    <div class="login-box" id="login-area">
        <select id="klas-select">
            <option value="Alfa">Alfa</option><option value="Bravo">Bravo</option>
            <option value="Charlie">Charlie</option><option value="Delta">Delta</option>
            <option value="Echo">Echo</option><option value="Foxtrot">Foxtrot</option>
            <option value="Golf">Golf</option><option value="Hotel">Hotel</option>
            <option value="Juliet">Juliet</option><option value="Kilo">Kilo</option>
            <option value="Lima">Lima</option><option value="Mike">Mike</option>
        </select>
        <input type="text" id="student-name" placeholder="Je naam...">
        <button onclick="startBingo()" style="background:var(--primary); color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer;">Start</button>
    </div>

    <div id="game-area" style="display:none;">
        <div class="bingo-grid" id="bingo-grid"></div>
        
        <h3>🏆 Tussenstand</h3>
        <div id="leaderboard">Laden...</div>
        
        <button class="btn-reset" onclick="resetData()">Clear alle resultaten (Admin)</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA3_rzoZOWytlyAbYKKe_WuFlD8z2WvbX4",
        authDomain: "aangifteq2les1.firebaseapp.com",
        databaseURL: "https://aangifteq2les1-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "aangifteq2les1",
        storageBucket: "aangifteq2les1.firebasestorage.app",
        messagingSenderId: "1071661084879",
        appId: "1:1071661084879:web:ec81dfed806ad75a8847ba"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const alleWoorden = ["Adolescent", "Hypocrisie", "Decadentie", "Integratie", "Capitulatie", "Confidentieel"];
    let currentUser = "";
    let marked = [];

    window.startBingo = function() {
        const name = document.getElementById('student-name').value;
        const klas = document.getElementById('klas-select').value;
        if(!name) return alert("Naam invullen!");
        
        currentUser = `${klas}_${name}`;
        document.getElementById('login-area').style.display = 'none';
        document.getElementById('game-area').style.display = 'block';
        
        const grid = document.getElementById('bingo-grid');
        alleWoorden.forEach(w => {
            const cell = document.createElement('div');
            cell.className = 'bingo-cell';
            cell.innerText = w;
            cell.onclick = () => {
                cell.classList.toggle('marked');
                marked = cell.classList.contains('marked') ? [...marked, w] : marked.filter(x => x !== w);
                set(ref(db, 'snelle_bingo/' + currentUser), { name, klas, score: marked.length });
            };
            grid.appendChild(cell);
        });

        onValue(ref(db, 'snelle_bingo'), (snap) => {
            const data = snap.val();
            let html = `<table><tr><th>Klas</th><th>Naam</th><th>Score</th></tr>`;
            const scores = Object.values(data || {}).sort((a,b) => b.score - a.score);
            scores.forEach(s => html += `<tr><td>${s.klas}</td><td>${s.name}</td><td><b>${s.score}/6</b></td></tr>`);
            document.getElementById('leaderboard').innerHTML = html + `</table>`;
        });
    };

    window.resetData = function() {
        if(prompt("Wachtwoord:") === "admin123") {
            remove(ref(db, 'snelle_bingo')).then(() => location.reload());
        }
    };
</script>
</body>
</html>
