        let mijnKaart = [];
        let afgevinkt = 0;
        const _d = (s) => decodeURIComponent(escape(window.atob(s)));

        window.login = () => {
            const naam = document.getElementById('naam').value.trim().toUpperCase();
            const klas = document.getElementById('klas').value;
            if(!naam || !klas) return alert("System requires full credentials.");
            
            window.user = { naam, klas };
            mijnKaart = [..._0xSecurity].sort(() => 0.5 - Math.random()).slice(0, 6);
            tekenKaart();
            
            document.getElementById('auth').style.display = 'none';
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('info-klas').innerText = `UNIT: ${klas} | AGENT: ${naam}`;
            loadLeaderboard(klas);
        };

        function tekenKaart() {
            const grid = document.getElementById('bingo-grid');
            grid.innerHTML = mijnKaart.map((item, index) => `
                <button id="btn-${index}" onclick="checkWoord(${index})" class="h-32 p-4 bg-white border-2 border-slate-200 rounded-3xl shadow-sm text-[10px] font-bold leading-tight hover:border-blue-900 transition-all flex items-center justify-center text-center italic uppercase">
                    "${_d(item.d)}"
                </button>
            `).join('');
        }

        window.checkWoord = (index) => {
            const data = mijnKaart[index];
            const audio = document.getElementById('podcast-player');
            
            if (audio.currentTime >= data.t) {
                const btn = document.getElementById(`btn-${index}`);
                if (!btn.disabled) {
                    btn.disabled = true;
                    btn.classList.replace('bg-white', 'bg-[#002d5e]');
                    btn.classList.add('text-white', 'not-italic', 'border-[#002d5e]');
                    btn.innerHTML = `<span class="text-xl mb-1">✓</span><br>${_d(data.w).toUpperCase()}`;
                    afgevinkt++;
                    if (afgevinkt === 6) meldWinst();
                }
            } else {
                alert("Niet sjoemelen! Dit woord is nog niet uitgesproken.");
            }
        };

        function meldWinst() {
            const winRef = ref(db, `bingo_2026/klassen/${window.user.klas}/winnaars`);
            push(winRef, { naam: window.user.naam, tijd: new Date().toLocaleTimeString() });
            alert("BINGO! Resultaat gerapporteerd aan de kaste der intellectuelen.");
        }

        window.resetLeaderboard = () => {
            if(confirm(`Wilt u de data van ${window.user.klas} vernietigen?`)) {
                remove(ref(db, `bingo_2026/klassen/${window.user.klas}/winnaars`));
            }
        };

        function loadLeaderboard(klas) {
            onValue(ref(db, `bingo_2026/klassen/${klas}/winnaars`), (snap) => {
                const list = document.getElementById('leaderboard-list');
                list.innerHTML = "";
                const data = snap.val();
                if(data) {
                    Object.values(data).reverse().forEach(w => {
                        list.innerHTML += `
                        <div class="p-3 bg-blue-50 rounded-2xl border-l-4 border-[#002d5e] text-[10px] font-black mb-2 uppercase flex justify-between items-center shadow-sm">
                            <span>${w.naam}</span>
                            <span class="text-[#002d5e]/30">${w.tijd}</span>
                        </div>`;
                    });
                }
            });
